<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VibeMon Static Server</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #e0e0e0;
    }
    .container {
      text-align: center;
      padding: 40px;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      color: #fff;
    }
    p {
      color: #888;
      margin-bottom: 30px;
    }
    .links {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }
    a {
      display: inline-block;
      padding: 12px 24px;
      background: linear-gradient(135deg, #9933FF 0%, #6600CC 100%);
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 500;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(153, 51, 255, 0.4);
    }
    .files {
      margin-top: 40px;
      text-align: left;
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 12px;
      display: inline-block;
    }
    .files h3 {
      color: #fff;
      margin-bottom: 15px;
      font-size: 1rem;
    }
    .files ul {
      list-style: none;
    }
    .files li {
      margin: 8px 0;
    }
    .files a {
      background: none;
      padding: 0;
      color: #9933FF;
      font-weight: normal;
    }
    .files a:hover {
      transform: none;
      box-shadow: none;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>VibeMon Static Server</h1>
    <p>Static files for VibeMon - AI Assistant Status Monitor</p>

    <div class="links">
      <a href="demo.html">Live Demo</a>
      <a href="https://github.com/nalbam/vibe-monitor" target="_blank">GitHub</a>
    </div>

    <div class="files">
      <h3>Files</h3>
      <ul>
        <li><a href="js/vibemon-engine-standalone.js">js/vibemon-engine-standalone.js</a></li>
        <li><a href="characters/clawd.png">characters/clawd.png</a></li>
        <li><a href="characters/kiro.png">characters/kiro.png</a></li>
        <li><a href="characters/claw.png">characters/claw.png</a></li>
      </ul>
    </div>
  </div>
</body>
</html>
